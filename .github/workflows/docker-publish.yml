name: Publish Docker Images

on:
  push:
    branches: [main]

jobs:
  agent:
    name: Build & push agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: emreboga
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/agent/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: emreboga/runafk-agent:latest
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent

  relay:
    name: Build & push relay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: emreboga
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/relay/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: emreboga/runafk-relay:latest
          cache-from: type=gha,scope=relay
          cache-to: type=gha,mode=max,scope=relay
